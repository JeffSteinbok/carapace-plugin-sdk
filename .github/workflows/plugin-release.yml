name: Plugin Release

# Reusable workflow — call this from your plugin repo's release.yml.
# Runs CI + manifest validation first, then bumps the version in package.json,
# commits and tags the bump, publishes to npm, and creates a draft GitHub release.
#
# Usage in your repo's .github/workflows/release.yml:
#
#   on:
#     workflow_dispatch:
#       inputs:
#         version-bump:
#           type: choice
#           options: [patch, minor, major]
#         prerelease:
#           type: choice
#           options: ['', alpha, beta, rc]
#
#   jobs:
#     release:
#       uses: JeffSteinbok/carapace-plugin-sdk/.github/workflows/plugin-release.yml@main
#       with:
#         version-bump: ${{ inputs.version-bump }}
#         prerelease: ${{ inputs.prerelease }}

on:
  workflow_call:
    inputs:
      version-bump:
        description: |
          Semver bump type:
            patch — bug fixes, no API changes (1.0.0 → 1.0.1)
            minor — new features, backwards compatible (1.0.0 → 1.1.0)
            major — breaking changes (1.0.0 → 2.0.0)
        required: true
        type: string
      prerelease:
        description: |
          Pre-release label. Leave empty for a stable release.
            alpha — early preview, may break
            beta  — feature-complete, may have bugs
            rc    — release candidate, believed stable
          Prerelease versions publish to npm under the label tag (not "latest"),
          so stable installs are unaffected.
        required: false
        type: string
        default: ""
      node-version:
        description: Node.js version to use for install, build, and publish.
        type: string
        default: "20"

jobs:
  # CI runs build + test + manifest validation (all in one job so the generated
  # openclaw.plugin.json is available for validation after build).
  ci:
    uses: JeffSteinbok/carapace-plugin-sdk/.github/workflows/plugin-ci.yml@main
    with:
      node-version: ${{ inputs.node-version }}

  # Bump the version, publish to npm, and create a GitHub release.
  # Only runs after CI succeeds.
  release:
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the version-bump commit and create a release
      id-token: write    # needed for npm trusted publishing (OIDC provenance)

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so git can push the bump commit back.
          fetch-depth: 0
          # Use the built-in GITHUB_TOKEN — no PAT required.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ---------------------------------------------------------------------------
      # Version calculation
      #
      # Reads the current version from package.json, increments the chosen
      # component, and appends the prerelease label if provided.
      #
      # Examples:
      #   current=1.2.3, bump=patch, prerelease=''    → 1.2.4
      #   current=1.2.3, bump=minor, prerelease=''    → 1.3.0
      #   current=1.2.3, bump=patch, prerelease=beta  → 1.2.4-beta
      # ---------------------------------------------------------------------------
      - name: Calculate new version
        id: version
        run: |
          set -euo pipefail

          current=$(jq -r '.version' package.json)
          pkg_name=$(jq -r '.name' package.json)
          IFS='.' read -r major minor patch <<< "$current"

          case "${{ inputs.version-bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *)
              echo "::error ::Unknown version-bump value: ${{ inputs.version-bump }}"
              exit 1
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          prerelease="${{ inputs.prerelease }}"

          if [ -n "$prerelease" ]; then
            new_version="${new_version}-${prerelease}"
          fi

          # npm dist-tag: prerelease versions publish under their label (e.g. "beta"),
          # stable versions publish under "latest".
          npm_tag="${prerelease:-latest}"
          is_prerelease="$( [ -n "$prerelease" ] && echo true || echo false )"

          echo "current=$current"       >> "$GITHUB_OUTPUT"
          echo "new=$new_version"       >> "$GITHUB_OUTPUT"
          echo "name=$pkg_name"         >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag"       >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

          echo "Version bump: $current → $new_version (npm tag: $npm_tag)"

      # Write the new version into package.json without creating a git commit yet.
      # --no-git-tag-version suppresses npm's built-in commit+tag behaviour so we
      # can control exactly what goes into the commit in the next step.
      - name: Bump version in package.json
        run: npm version ${{ steps.version.outputs.new }} --no-git-tag-version

      # Build after the version bump so the dist reflects the new version number
      # (some plugins embed it at build time via package.json imports).
      - name: Build
        run: npm run build

      # Commit the bumped package.json (and package-lock.json if present),
      # create an annotated tag, and push both back to the default branch.
      - name: Commit version bump and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage version files. package-lock.json may not exist in all repos.
          git add package.json
          git add package-lock.json 2>/dev/null || true

          git commit -m "Bump version to ${{ steps.version.outputs.new }}"
          git tag -a "v${{ steps.version.outputs.new }}" \
              -m "Release v${{ steps.version.outputs.new }}"

          git push
          git push origin "v${{ steps.version.outputs.new }}"

      # Publish to npm using trusted publishing (OIDC provenance).
      # No npm token needed — npm verifies the GitHub Actions identity.
      - name: Publish to npm
        run: npm publish --access public --provenance --tag ${{ steps.version.outputs.npm_tag }}

      # Create a draft GitHub release so you can review and edit release notes
      # before publishing. Promote it to published from the Releases UI.
      - name: Create GitHub release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.new }}
          PKG_NAME: ${{ steps.version.outputs.name }}
          NPM_TAG: ${{ steps.version.outputs.npm_tag }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        run: |
          prerelease_flag=""
          [ "$IS_PRERELEASE" = "true" ] && prerelease_flag="--prerelease"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --draft \
            $prerelease_flag \
            --notes "## v${VERSION}

          ### Installation

          \`\`\`bash
          npm install ${PKG_NAME}@${NPM_TAG}
          \`\`\`

          ### Changes
          <!-- Fill in release notes before publishing. -->
          "
